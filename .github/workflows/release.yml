name: Build and Release EXE

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  check-code:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: windows-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate syntax
        run: python -m py_compile json_to_csv_gui.py

      - name: Smoke test conversion flow
        shell: pwsh
        run: |
          @'
          import csv
          import json
          import tempfile
          from pathlib import Path

          from json_to_csv_gui import collect_json_files, convert_json_file_to_csv

          with tempfile.TemporaryDirectory() as tmp:
              root = Path(tmp)
              input_dir = root / "input"
              output_dir = root / "output"
              input_dir.mkdir()
              output_dir.mkdir()

              sample = input_dir / "sample.json"
              sample.write_text(
                  json.dumps([{"id": 1, "name": "A"}, {"id": 2, "name": "B"}]),
                  encoding="utf-8",
              )

              files = collect_json_files(input_dir, recursive=False)
              assert len(files) == 1, f"expected 1 json file, found {len(files)}"

              out = output_dir / "sample.csv"
              rows = convert_json_file_to_csv(sample, out)
              assert rows == 2, f"expected 2 rows, got {rows}"
              assert out.exists(), "csv output was not created"

              with out.open(newline="", encoding="utf-8") as handle:
                  data = list(csv.DictReader(handle))

              assert len(data) == 2, f"expected 2 csv rows, got {len(data)}"
              assert data[0]["id"] == "1", f"unexpected first row id: {data[0]['id']}"

          print("Smoke test passed.")
          '@ | python -

  build-release:
    if: ${{ github.event.pull_request.merged == true }}
    needs: check-code
    runs-on: windows-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name headcode-json-to-csv json_to_csv_gui.py

      - name: Verify EXE exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/headcode-json-to-csv.exe")) {
            throw "Build failed: dist/headcode-json-to-csv.exe not found"
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: headcode-json-to-csv-exe
          path: dist/headcode-json-to-csv.exe
          if-no-files-found: error

  release:
    if: ${{ github.event.pull_request.merged == true }}
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: headcode-json-to-csv-exe
          path: release-assets

      - name: Generate tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d').${{ github.run_number }}.${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Headcode JSON to CSV ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          body: |
            Automated release for merged PR #${{ github.event.pull_request.number }}.
            Commit: ${{ github.event.pull_request.merge_commit_sha }}
          files: release-assets/headcode-json-to-csv.exe
